<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Miquelon Hills Golf Course">
  <title>Miquelon Hills Golf Course</title>
  <!-- Forest-green disc -->
  <circle cx="32" cy="32" r="32" fill="#1C4209"/>
  <!-- Aged-gold inner ring for the club-emblem feel -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#A07828" stroke-width="1.2" opacity="0.85"/>
  <!-- Wordmark monogram: M and H tucked together, parchment-cream letterforms -->
  <g fill="#EDE8D4" font-family="'Playfair Display', 'Georgia', serif" font-weight="800" letter-spacing="-2">
    <text x="32" y="42" text-anchor="middle" font-size="30">MH</text>
  </g>
</svg>
